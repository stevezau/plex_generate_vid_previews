name: Build and Push Docker Image

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
  workflow_dispatch:

env:
  # Change this to your Docker Hub image name for forks.
  # See CONTRIBUTING.md for full instructions.
  DOCKER_IMAGE: stevezzau/plex_generate_vid_previews

concurrency:
  # In workflow_run context, github.ref is the default branch, so dev/main/
  # tag runs would share one group. Key off the upstream run's head_branch
  # so parallel dev+main+tag builds don't queue behind each other.
  group: docker-publish-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  context:
    runs-on: ubuntu-latest
    # Gate every downstream job: manual dispatch, or a successful Tests run
    # triggered by a push (main/dev branches or *.*.* tags — test.yml's
    # triggers). PR-triggered Tests runs are explicitly excluded so opening
    # a PR never publishes a Docker image.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    outputs:
      head_branch: ${{ steps.ctx.outputs.head_branch }}
      head_sha: ${{ steps.ctx.outputs.head_sha }}
      is_tag: ${{ steps.ctx.outputs.is_tag }}
      docker_tags: ${{ steps.ctx.outputs.docker_tags }}
    steps:
      - name: Compute build context
        id: ctx
        env:
          # In workflow_run context, github.ref points to the default branch.
          # Use the upstream run's head_branch/head_sha so dev and tag builds
          # resolve correctly. Falls back to github.ref_name/github.sha for
          # workflow_dispatch.
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || github.ref_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          if [[ "$HEAD_BRANCH" == "main" ]]; then
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "docker_tags=-t ${{ env.DOCKER_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          elif [[ "$HEAD_BRANCH" == "dev" ]]; then
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "docker_tags=-t ${{ env.DOCKER_IMAGE }}:dev" >> "$GITHUB_OUTPUT"
          else
            # test.yml only triggers on main/dev/*.*.* tags, so any other
            # head_branch here must be a semver tag from a release.
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "docker_tags=-t ${{ env.DOCKER_IMAGE }}:$HEAD_BRANCH -t ${{ env.DOCKER_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: context
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Validate Docker secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::DOCKER_USERNAME and DOCKER_PASSWORD must be set in repository secrets"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm versioning
          ref: ${{ needs.context.outputs.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_BRANCH=${{ needs.context.outputs.head_branch }}
            GIT_SHA=${{ needs.context.outputs.head_sha }}
            ${{ needs.context.outputs.is_tag == 'true' && format('SETUPTOOLS_SCM_PRETEND_VERSION={0}', needs.context.outputs.head_branch) || '' }}
          outputs: type=image,name=${{ env.DOCKER_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [context, build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm versioning
          ref: ${{ needs.context.outputs.head_sha }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            ${{ needs.context.outputs.docker_tags }} \
            $(printf '${{ env.DOCKER_IMAGE }}@sha256:%s ' *)

  update-dockerhub-description:
    runs-on: ubuntu-latest
    needs: context
    # Only update the public Docker Hub description from main builds.
    if: needs.context.outputs.head_branch == 'main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: stevezzau/plex_generate_vid_previews
          readme-filepath: ./DOCKERHUB_README.md
