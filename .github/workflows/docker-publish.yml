name: Build and Push Docker Image

on:
  workflow_run:
    workflows: [Tests]
    types: [completed]
    branches: [main]
  push:
    branches: [dev]
  workflow_dispatch:

env:
  # Change this to your Docker Hub image name for forks.
  # See CONTRIBUTING.md for full instructions.
  DOCKER_IMAGE: stevezzau/plex_generate_vid_previews

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' || (github.event_name == 'push' && github.ref == 'refs/heads/dev') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm versioning

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set image tags
        id: set_tags
        run: |
          if [ "${{ steps.meta.outputs.branch }}" = "main" ]; then
            echo "tag_suffix=latest" >> "$GITHUB_OUTPUT"
            echo "tag_sha=${{ steps.meta.outputs.sha_short }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag_suffix=dev" >> "$GITHUB_OUTPUT"
            echo "tag_sha=dev-${{ steps.meta.outputs.sha_short }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ steps.set_tags.outputs.tag_suffix }}
            ${{ env.DOCKER_IMAGE }}:${{ steps.set_tags.outputs.tag_sha }}
          build-args: |
            GIT_BRANCH=${{ steps.meta.outputs.branch }}
            GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
