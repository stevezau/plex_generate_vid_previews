name: CI

on:
  push:
    branches: [dev]
    tags: ['*.*.*']
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - 'unraid-templates/**'
      - 'docker-compose.example.yml'
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.github/instructions/**'
      - '.github/prompts/**'
      - 'unraid-templates/**'
      - 'docker-compose.example.yml'
  workflow_dispatch:

env:
  # Change this to your Docker Hub image name for forks.
  # See CONTRIBUTING.md for full instructions.
  DOCKER_IMAGE: stevezzau/plex_generate_vid_previews

concurrency:
  # Cancel superseded PR runs; never cancel in-flight pushes to main/dev/tags
  # so a partially-pushed Docker build isn't aborted mid-manifest.
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least-privilege defaults. The build job opts into packages:write below
# when it needs to push to GHCR / Docker Hub.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg mediainfo

      - name: Install dependencies
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest -m "not gpu and not e2e" --cov-report=xml

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  context:
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Only publish on push to main/dev/tags or manual dispatch. PR runs stop
    # after lint/test so opening a PR never publishes a Docker image.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    outputs:
      head_branch: ${{ steps.ctx.outputs.head_branch }}
      head_sha: ${{ steps.ctx.outputs.head_sha }}
      is_tag: ${{ steps.ctx.outputs.is_tag }}
      docker_tags: ${{ steps.ctx.outputs.docker_tags }}
    steps:
      - name: Compute build context
        id: ctx
        env:
          HEAD_BRANCH: ${{ github.ref_name }}
          HEAD_SHA: ${{ github.sha }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          if [[ "$REF_TYPE" == "tag" ]]; then
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "docker_tags=-t ${{ env.DOCKER_IMAGE }}:$HEAD_BRANCH -t ${{ env.DOCKER_IMAGE }}:latest" >> "$GITHUB_OUTPUT"
          else
            # dev branch push or manual workflow_dispatch
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "docker_tags=-t ${{ env.DOCKER_IMAGE }}:dev" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: context
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Validate Docker secrets
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ] || [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
            echo "::error::DOCKER_USERNAME and DOCKER_PASSWORD must be set in repository secrets"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm versioning
          ref: ${{ needs.context.outputs.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            GIT_BRANCH=${{ needs.context.outputs.head_branch }}
            GIT_SHA=${{ needs.context.outputs.head_sha }}
            ${{ needs.context.outputs.is_tag == 'true' && format('SETUPTOOLS_SCM_PRETEND_VERSION={0}', needs.context.outputs.head_branch) || '' }}
          outputs: type=image,name=${{ env.DOCKER_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [context, build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm versioning
          ref: ${{ needs.context.outputs.head_sha }}

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            ${{ needs.context.outputs.docker_tags }} \
            $(printf '${{ env.DOCKER_IMAGE }}@sha256:%s ' *)

  update-dockerhub-description:
    runs-on: ubuntu-latest
    needs: context
    # Only update the public Docker Hub description from main builds.
    if: needs.context.outputs.head_branch == 'main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: stevezzau/plex_generate_vid_previews
          readme-filepath: ./DOCKERHUB_README.md
