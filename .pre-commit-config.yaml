repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: check-merge-conflict

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-no-eval

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: ["-ll", "--skip", "B101,B404,B603,B607,B608"]
        # B101 assert_used (fine in tests)
        # B404 import_subprocess / B603 subprocess_without_shell_equals_true /
        # B607 start_process_with_partial_path (we call FFmpeg by name on $PATH by design)
        # B608 hardcoded_sql_expressions (no SQL strings in this repo; avoid SQLAlchemy false-positives)
        exclude: ^(tests/|plex_generate_previews/_version\.py$)
