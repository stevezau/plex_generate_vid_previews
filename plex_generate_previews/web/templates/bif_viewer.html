{% extends "base.html" %}

{% block title %}BIF Viewer - Plex Preview Generator{% endblock %}

{% block head %}
<style>
    #previewFrame {
        max-width: 100%;
        height: auto;
        border-radius: 0.375rem;
        background: #1a1a1a;
        min-height: 180px;
        display: block;
        margin: 0 auto;
    }
    #frameSlider { width: 100%; cursor: pointer; }
    .result-item { cursor: pointer; transition: background-color 0.15s; overflow: hidden; }
    .result-item:hover { background-color: rgba(255,255,255,0.05); }
    .result-item.active { background-color: rgba(13,110,253,0.15); border-color: #0d6efd !important; }
    .result-detail { min-width: 0; flex: 1 1 0; }
    .file-path {
        font-family: monospace;
        font-size: 0.72rem;
        overflow-wrap: break-word;
        word-break: break-all;
        line-height: 1.3;
        color: rgba(255,255,255,0.5);
    }
    .result-meta { font-size: 0.75rem; }
    .badge-stat { font-size: 0.78rem; font-weight: 500; }
    .suspect-badge { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }
    .grid-thumb {
        width: 120px; height: 68px;
        object-fit: cover;
        border-radius: 4px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: border-color 0.15s, transform 0.15s;
    }
    .grid-thumb:hover { border-color: #0d6efd; transform: scale(1.05); }
    .grid-thumb.active { border-color: #0d6efd; }
    #gridContainer { max-height: 400px; overflow-y: auto; }
    .ts-label { font-variant-numeric: tabular-nums; }
</style>
{% endblock %}

{% block content %}
<!-- Search bar -->
<div class="row justify-content-center mb-4">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-body py-3">
                <ul class="nav nav-pills nav-fill mb-3" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabSearch" type="button">
                            <i class="bi bi-search me-1"></i>Search Plex
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabPath" type="button">
                            <i class="bi bi-clipboard me-1"></i>Paste BIF Path
                        </button>
                    </li>
                </ul>
                <div class="tab-content">
                    <div class="tab-pane fade show active" id="tabSearch">
                        <div class="input-group">
                            <input type="text" id="searchInput" class="form-control" placeholder="Title, e.g. Inception or Breaking Bad S03E02..." autocomplete="off">
                            <button class="btn btn-primary" id="searchBtn" type="button">
                                <i class="bi bi-search me-1"></i>Search
                            </button>
                        </div>
                    </div>
                    <div class="tab-pane fade" id="tabPath">
                        <p class="text-muted small mb-2">Paste a BIF file path from the processing logs:</p>
                        <div class="input-group">
                            <input type="text" id="pathInput" class="form-control" placeholder="/plex/Media/localhost/.../index-sd.bif">
                            <button class="btn btn-primary" id="loadPathBtn" type="button">
                                <i class="bi bi-folder2-open me-1"></i>Load
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Search results -->
<div class="row justify-content-center mb-4">
    <div class="col-lg-8">
        <div id="searchResults"></div>
    </div>
</div>

<!-- Viewer (hidden until a BIF is loaded) -->
<div id="viewerPanel" class="d-none">
    <!-- Metadata badges -->
    <div class="row justify-content-center mb-3">
        <div class="col-lg-10">
            <div class="d-flex flex-wrap gap-2 align-items-center" id="metaBadges"></div>
        </div>
    </div>

    <div class="row justify-content-center g-4">
        <!-- Preview frame -->
        <div class="col-lg-7">
            <div class="card">
                <div class="card-body text-center p-3">
                    <img id="previewFrame" alt="BIF frame preview" src="">
                    <div class="mt-3">
                        <input type="range" class="form-range" id="frameSlider" min="0" max="0" value="0">
                    </div>
                    <div class="d-flex justify-content-between align-items-center mt-1">
                        <button class="btn btn-sm btn-outline-secondary" id="prevBtn" title="Previous frame (Left arrow)">
                            <i class="bi bi-chevron-left"></i>
                        </button>
                        <span class="text-muted ts-label">
                            Frame <strong id="currentFrame">0</strong> / <span id="totalFrames">0</span>
                            &mdash;
                            <span id="currentTimestamp">00:00:00</span>
                        </span>
                        <button class="btn btn-sm btn-outline-secondary" id="nextBtn" title="Next frame (Right arrow)">
                            <i class="bi bi-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Thumbnail grid -->
        <div class="col-lg-3">
            <div class="card">
                <div class="card-header py-2">
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="small fw-semibold"><i class="bi bi-grid-3x3 me-1"></i>Overview</span>
                        <select id="gridStep" class="form-select form-select-sm" style="width:auto; font-size:0.75rem;">
                            <option value="5">Every 5th</option>
                            <option value="10" selected>Every 10th</option>
                            <option value="25">Every 25th</option>
                            <option value="50">Every 50th</option>
                        </select>
                    </div>
                </div>
                <div class="card-body p-2" id="gridContainer">
                    <div class="d-flex flex-wrap gap-1 justify-content-center" id="gridThumbs"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Empty state (before any BIF is loaded) -->
<div id="emptyState" class="text-center text-muted py-5 d-none"></div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    const $ = id => document.getElementById(id);

    let bifPath = '';
    let bifMeta = null;

    // --- Helpers ---

    function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function formatTimestamp(frameIndex, intervalMs) {
        const totalSec = Math.floor(frameIndex * intervalMs / 1000);
        const h = Math.floor(totalSec / 3600);
        const m = Math.floor((totalSec % 3600) / 60);
        const s = totalSec % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    function formatDate(iso) {
        if (!iso) return '';
        try { return new Date(iso).toLocaleString(); }
        catch { return iso; }
    }

    function frameUrl(path, index) {
        return `/api/bif/frame?path=${encodeURIComponent(path)}&index=${index}`;
    }

    // --- Search ---

    async function doSearch() {
        const query = $('searchInput').value.trim();
        if (query.length < 2) {
            showToast('BIF Viewer', 'Enter at least 2 characters', 'warning');
            return;
        }

        $('searchBtn').disabled = true;
        $('searchBtn').innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Searching...';
        $('searchResults').innerHTML = '<div class="text-center text-muted py-3"><div class="spinner-border spinner-border-sm"></div> Searching Plex...</div>';

        try {
            const resp = await fetch(`/api/bif/search?q=${encodeURIComponent(query)}`);
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || 'Search failed');
            renderResults(data.results || []);
        } catch (e) {
            $('searchResults').innerHTML = `<div class="alert alert-danger py-2 small">${escapeHtml(e.message)}</div>`;
        }

        $('searchBtn').disabled = false;
        $('searchBtn').innerHTML = '<i class="bi bi-search me-1"></i>Search';
    }

    function renderResults(results) {
        if (!results.length) {
            $('searchResults').innerHTML = '<div class="text-muted text-center py-3 small">No results found</div>';
            return;
        }

        const list = document.createElement('div');
        list.className = 'list-group';

        for (const r of results) {
            const a = document.createElement('a');
            a.href = '#';
            a.className = `list-group-item list-group-item-action result-item py-2 px-3${!r.bif_exists ? ' opacity-50' : ''}`;
            a.dataset.bifPath = r.bif_path;
            a.dataset.bifExists = String(r.bif_exists);
            a.dataset.title = r.title;

            const statusBadge = r.bif_exists
                ? '<span class="badge bg-success">BIF</span>'
                : '<span class="badge bg-secondary">No BIF</span>';
            const sizeText = r.file_size ? formatBytes(r.file_size) : '';
            const dateText = r.created_at ? formatDate(r.created_at) : '';
            const metaParts = [sizeText, dateText].filter(Boolean).join(' \u00b7 ');

            a.innerHTML = `<div class="d-flex align-items-start">
                <div class="me-2 mt-1">${statusBadge}</div>
                <div class="result-detail">
                    <div class="fw-semibold">${escapeHtml(r.title)}</div>
                    <div class="file-path mt-1">${escapeHtml(r.media_file)}</div>
                    ${metaParts ? `<div class="result-meta text-muted mt-1">${escapeHtml(metaParts)}</div>` : ''}
                </div>
            </div>`;

            a.addEventListener('click', e => {
                e.preventDefault();
                if (a.dataset.bifExists !== 'true') {
                    showToast('BIF Viewer', 'No BIF file exists for this item yet', 'warning');
                    return;
                }
                list.querySelectorAll('.result-item').forEach(el => el.classList.remove('active'));
                a.classList.add('active');
                loadBif(a.dataset.bifPath, a.dataset.title);
            });

            list.appendChild(a);
        }

        $('searchResults').replaceChildren(list);
    }

    // --- Load BIF ---

    async function loadBif(path, title) {
        bifPath = path;

        try {
            const resp = await fetch(`/api/bif/info?path=${encodeURIComponent(path)}`);
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || 'Failed to load BIF');
            bifMeta = data;
            showViewer(title || path);
        } catch (e) {
            showToast('BIF Viewer', e.message, 'danger');
        }
    }

    function showViewer(title) {
        $('emptyState').classList.add('d-none');
        $('viewerPanel').classList.remove('d-none');

        const m = bifMeta;
        const totalDuration = formatTimestamp(m.frame_count - 1, m.frame_interval_ms);

        let badges = `<span class="badge bg-primary badge-stat">${escapeHtml(title)}</span>`;
        badges += `<span class="badge bg-info badge-stat"><i class="bi bi-calendar3 me-1"></i>Generated: ${formatDate(m.created_at)}</span>`;
        badges += `<span class="badge bg-secondary badge-stat"><i class="bi bi-images me-1"></i>${m.frame_count.toLocaleString()} frames</span>`;
        badges += `<span class="badge bg-secondary badge-stat"><i class="bi bi-clock me-1"></i>${m.frame_interval_ms / 1000}s interval &middot; ${totalDuration}</span>`;
        badges += `<span class="badge bg-secondary badge-stat"><i class="bi bi-file-earmark me-1"></i>${formatBytes(m.file_size)}</span>`;
        badges += `<span class="badge bg-secondary badge-stat">Avg frame: ${formatBytes(m.avg_frame_size)}</span>`;

        if (m.suspect_frame_count > 0) {
            badges += `<span class="badge bg-warning text-dark badge-stat suspect-badge"><i class="bi bi-exclamation-triangle me-1"></i>${m.suspect_frame_count} suspect frame(s)</span>`;
        }

        $('metaBadges').innerHTML = badges;

        const slider = $('frameSlider');
        slider.max = m.frame_count - 1;
        slider.value = 0;
        $('totalFrames').textContent = (m.frame_count - 1).toLocaleString();

        setFrame(0);
        buildGrid();
    }

    function setFrame(index) {
        if (!bifMeta) return;
        index = Math.max(0, Math.min(index, bifMeta.frame_count - 1));
        $('frameSlider').value = index;
        $('currentFrame').textContent = index.toLocaleString();
        $('currentTimestamp').textContent = formatTimestamp(index, bifMeta.frame_interval_ms);
        $('previewFrame').src = frameUrl(bifPath, index);

        // Preload adjacent frames for smoother scrubbing
        const max = bifMeta.frame_count - 1;
        for (const adj of [index - 1, index + 1]) {
            if (adj >= 0 && adj <= max) { new Image().src = frameUrl(bifPath, adj); }
        }

        document.querySelectorAll('.grid-thumb.active').forEach(t => t.classList.remove('active'));
        const activeThumb = document.querySelector(`.grid-thumb[data-index="${index}"]`);
        if (activeThumb) {
            activeThumb.classList.add('active');
            activeThumb.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
    }

    // --- Thumbnail grid ---

    function buildGrid() {
        const step = parseInt($('gridStep').value) || 10;
        const container = $('gridThumbs');
        container.innerHTML = '';

        const fragment = document.createDocumentFragment();
        for (let i = 0; i < bifMeta.frame_count; i += step) {
            const img = document.createElement('img');
            img.className = 'grid-thumb';
            img.alt = `Frame ${i}`;
            img.title = `Frame ${i} — ${formatTimestamp(i, bifMeta.frame_interval_ms)}`;
            img.dataset.index = i;
            img.loading = 'lazy';
            img.src = frameUrl(bifPath, i);
            img.addEventListener('click', () => setFrame(i));
            fragment.appendChild(img);
        }
        container.appendChild(fragment);
    }

    // --- Event listeners ---

    $('searchBtn').addEventListener('click', doSearch);
    $('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    $('loadPathBtn').addEventListener('click', () => {
        const path = $('pathInput').value.trim();
        if (!path) { showToast('BIF Viewer', 'Enter a BIF file path', 'warning'); return; }
        loadBif(path, '');
    });
    $('pathInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') $('loadPathBtn').click();
    });

    $('frameSlider').addEventListener('input', e => {
        setFrame(parseInt(e.target.value));
    });

    $('prevBtn').addEventListener('click', () => setFrame(parseInt($('frameSlider').value) - 1));
    $('nextBtn').addEventListener('click', () => setFrame(parseInt($('frameSlider').value) + 1));
    $('gridStep').addEventListener('change', buildGrid);

    document.addEventListener('keydown', e => {
        if (!bifMeta) return;
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
        const cur = parseInt($('frameSlider').value);
        if (e.key === 'ArrowLeft') { e.preventDefault(); setFrame(cur - 1); }
        if (e.key === 'ArrowRight') { e.preventDefault(); setFrame(cur + 1); }
    });
})();
</script>
{% endblock %}
